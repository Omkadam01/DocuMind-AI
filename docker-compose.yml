version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/documind.db:/app/documind.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://backend:8000
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
